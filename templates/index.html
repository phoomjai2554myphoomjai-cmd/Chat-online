<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กลุ่มแชทลับ (ไม่ต้องง้อ Line)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket-io/4.0.1/socket-io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        #login-screen, #chat-screen { max-width: 500px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #chat-screen { display: none; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #e4e6eb; width: fit-content; max-width: 80%; }
        .msg .time { font-size: 0.8em; color: #65676b; margin-left: 10px; }
        .msg .user { font-weight: bold; color: #050505; block; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #0084ff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #006bcb; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ยินดีต้อนรับสู่แชทไร้สายไร้กลุ่มไลน์</h2>
        <p>พิมพ์ชื่อเล่นของคุณเพื่อเข้าสู่ห้องแชททันที:</p>
        <input type="text" id="username-input" placeholder="ชื่อเล่นสุดเท่ของคุณ...">
        <button onclick="joinChat()">เข้าสู่ห้องแชท</button>
    </div>

    <div id="chat-screen">
        <h3 id="welcome-text">ห้องแชทรวมพลคนขี้เกียจ</h3>
        <div id="messages"></div>
        <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" style="margin-top: 10px;">ส่งข้อความ</button>
    </div>

    <script>
        const socket = io();
        let myUsername = "";

        function joinChat() {
            const input = document.getElementById('username-input').value.trim();
            if (input) {
                myUsername = input;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                document.getElementById('welcome-text').innerText = `คุยกันในนาม: ${myUsername}`;
            } else {
                alert("กรุณาใส่ชื่อเล่นก่อนนะอิน้อง!");
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById('message-input');
            const message = msgInput.value.trim();
            if (message && myUsername) {
                // ส่งข้อมูลไปที่ Server Python
                socket.emit('send_message', { username: myUsername, message: message });
                msgInput.value = '';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // รอรับข้อความที่ Server ส่งกระจายกลับมา
        socket.on('receive_message', function(data) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.classList.add('msg');
            
            // ใส่โครงสร้างข้อความ ชื่อ - เนื้อหา - เวลาไทย
            messageElement.innerHTML = `<span class="user">${data.username}:</span> <span>${data.message}</span> <span class="time">${data.time}</span>`;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // เลื่อนหน้าจอลงมาล่างสุดอัตโนมัติเมื่อมีข้อความใหม่
            
            // ส่งการแจ้งเตือนเสียงสั้นๆ หรือสั่นหน้าจอได้ถ้าต้องการ (ในที่นี้ใช้เสียงเตือนพื้นฐานของเบราว์เซอร์ได้)
        });
    </script>
</body>
</html>
