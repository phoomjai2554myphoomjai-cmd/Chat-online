<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กลุ่มแชทลับ (ไม่ต้องง้อ Line)</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        #login-screen, #chat-screen { max-width: 500px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #chat-screen { display: none; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #e4e6eb; width: fit-content; max-width: 80%; display: inline-block; word-break: break-word; }
        .msg .time { font-size: 0.8em; color: #65676b; margin-left: 10px; }
        .msg .user { font-weight: bold; color: #0084ff; display: block; margin-bottom: 2px; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #0084ff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #006bcb; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ยินดีต้อนรับสู่แชทไร้สายไร้กลุ่มไลน์</h2>
        <p>พิมพ์ชื่อเล่นของคุณเพื่อเข้าสู่ห้องแชททันที:</p>
        <input type="text" id="username-input" placeholder="ชื่อเล่นสุดเท่ของคุณ...">
        <button onclick="joinChat()">เข้าสู่ห้องแชท</button>
    </div>

    <div id="chat-screen">
        <h3 id="welcome-text">ห้องแชทรวมพลคนขี้เกียจ</h3>
        <div id="messages"></div>
        <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" style="margin-top: 10px;">ส่งข้อความ</button>
    </div>

    <script>
        const socket = io({
            transports: ['websocket', 'polling']
        });
        
        let myUsername = "";

        // 🔎 ด่านแรก: พอเปิดเว็บมาปุ๊บ ให้เช็คทันทีว่าเครื่องนี้เคยบันทึกชื่อไว้ไหม?
        window.onload = function() {
            const savedUsername = localStorage.getItem('chat_secret_username');
            if (savedUsername) {
                // ถ้าเจอชื่อเก่าในเครื่อง ให้ล็อกอินเข้าห้องแชทให้เลยอัตโนมัติ!
                myUsername = savedUsername;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                document.getElementById('welcome-text').innerText = `ต้อนรับกลับ: ${myUsername}`;
            }
        };

        function joinChat() {
            const input = document.getElementById('username-input').value.trim();
            if (input) {
                myUsername = input;
                
                // 💾 บันทึกชื่อลงความจำถาวรของบราวเซอร์ในเครื่อง
                localStorage.setItem('chat_secret_username', myUsername);
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                document.getElementById('welcome-text').innerText = `คุยกันในนาม: ${myUsername}`;
            } else {
                alert("กรุณาใส่ชื่อเล่นก่อนนะอิน้อง!");
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById('message-input');
            const message = msgInput.value.trim();
            if (message && myUsername) {
                socket.emit('send_message', { 'username': myUsername, 'message': message });
                msgInput.value = '';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // โหลดประวัติข้อความเก่า
        socket.on('load_history', function(history) {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            history.forEach(function(data) {
                const messageElement = document.createElement('div');
                messageElement.classList.add('msg');
                const user = data.username || data['username'];
                const message = data.message || data['message'];
                const time = data.time || data['time'];
                
                messageElement.innerHTML = `<span class="user">${user}:</span><span>${message}</span><span class="time">${time}</span>`;
                messagesDiv.appendChild(messageElement);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        // รับข้อความใหม่
        socket.on('receive_message', function(data) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.classList.add('msg');
            
            const user = data.username || data['username'];
            const message = data.message || data['message'];
            const time = data.time || data['time'];
            
            messageElement.innerHTML = `<span class="user">${user}:</span><span>${message}</span><span class="time">${time}</span>`;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
